name: Update Dev City

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  push:
    branches: [main]       # also runs on every push so first deploy works
  workflow_dispatch:        # manual trigger from GitHub Actions UI

permissions:
  contents: write           # needed to commit city-data.json back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch repo data and generate city-data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-city-data.js

      - name: Commit updated city-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add city-data.json
          git diff --cached --quiet || git commit -m "chore: update city data [skip ci]"
          git push
